<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iniciar sesión — Panel Axon Labs</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" href="../assets/favicon.ico" sizes="any">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="dashboard.css">
</head>
<body>
<canvas id="fx-canvas" aria-hidden="true"></canvas>
<div class="grain" aria-hidden="true"></div>

<div class="auth-shell">
  <div class="glow-orb" style="width:420px;height:420px;background:var(--violet);opacity:.16;top:-100px;left:-100px;"></div>
  <div class="glow-orb" style="width:380px;height:380px;background:var(--cyan);opacity:.13;bottom:-100px;right:-100px;"></div>

  <div class="auth-card">
    <div class="auth-logo">
      <img src="../assets/logo-mark-alpha.png" alt="Axon Labs">
      <strong style="font-family:var(--font-display);">Axon Labs</strong>
    </div>
    <h1>Panel de administración</h1>
    <p class="sub">Acceso exclusivo para el equipo de Axon Labs.</p>

    <form id="login-form" novalidate>
      <div class="field">
        <label for="login-email">Correo</label>
        <input type="email" id="login-email" name="email" autocomplete="username" required>
      </div>
      <div class="field">
        <label for="login-pass">Contraseña</label>
        <input type="password" id="login-pass" name="password" autocomplete="current-password" required>
      </div>
      <div class="auth-error" id="login-error" role="alert"></div>
      <button type="submit" class="btn btn-primary" id="login-submit">Iniciar sesión</button>
    </form>
    <p class="sub" style="margin-top:22px;"><a href="../index.html" style="color:var(--cyan-2);">← Volver al sitio</a></p>
  </div>
</div>

<script src="../js/main.js"></script>
<script type="module" src="auth.js"></script>
</body>
</html>
